<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pwn-tracker — portswigger academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <Style>
    :root {
  --bg: #05080e;
  --bg2: #0a0e17;
  --bg3: #0f1520;
  --bg-card: #0d1220;
  --cyan: #00f0ff;
  --green: #00ff88;
  --red: #ff3355;
  --amber: #ffaa00;
  --purple: #8844ff;
  --text: #c8d0e0;
  --text-dim: #5a6a8a;
  --text-dimmer: #3a4a6a;
  --radius: 8px;
  --glow-cyan: 0 0 20px rgba(0,240,255,0.15), 0 0 60px rgba(0,240,255,0.05);
  --glow-green: 0 0 20px rgba(0,255,136,0.15), 0 0 60px rgba(0,255,136,0.05);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{
  font-family:'JetBrains Mono',monospace;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.12);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,240,255,0.25)}
::selection{background:rgba(0,240,255,0.2);color:#fff}

#matrixCanvas{
  position:fixed;inset:0;
  z-index:0;
  width:100%;height:100%;
  opacity:0.35;
  pointer-events:none;
}

.scanlines{
  position:fixed;inset:0;
  z-index:9999;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent 0,transparent 2px,
    rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px
  );
}

#app{position:relative;z-index:1;min-height:100vh}

body.is-transitioning #matrixCanvas{
  opacity:0.8!important;
  transition:opacity 0.25s ease;
}

.view{display:none;min-height:100vh;animation:fadeSlideIn 0.5s ease}
.view.active{display:block}
.view-hidden{display:none!important}

@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes skullFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}

@keyframes skullGlitch{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,1px)skew(-0.3deg)}
  40%{transform:translate(2px,-1px)skew(0.3deg)}
  60%{transform:translate(-1px,2px)}
  80%{transform:translate(1px,-1px)}
  100%{transform:translate(0)}
}

/* ===== LOADING SCREEN ===== */
.loading-screen{
  position:fixed;inset:0;
  z-index:10000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1.5rem;
  background:var(--bg);
  transition:opacity 0.6s ease,visibility 0.6s ease;
}
.loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-text{font-size:1rem;color:var(--text-dim)}
.loading-cmd{color:var(--cyan)}
.loading-cursor{color:var(--cyan);font-size:1rem}
.loading-bar-track{
  width:280px;height:2px;
  background:rgba(255,255,255,0.04);
  border-radius:2px;overflow:hidden;
}
.loading-bar-inner{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--green));
  border-radius:2px;
  box-shadow:0 0 12px rgba(0,240,255,0.3);
  transition:width 0.3s ease;
}

/* ===== DASHBOARD ===== */
.dashboard{min-height:100vh;padding:1.5rem 2.5rem;display:flex;flex-direction:column}

.dash-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:1rem;
  border-bottom:1px solid rgba(0,240,255,0.06);
  position:relative;
}
.dash-nav::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,var(--cyan),transparent 60%);
  opacity:0.15;
}

.skull-logo{
  user-select:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:1.2rem;
  animation:skullFloat 4s ease-in-out infinite;
  transition:all 0.2s ease;
}
.skull-logo svg{
  width:1.2em;
  height:1.2em;
  display:block;
  filter:drop-shadow(0 0 4px rgba(0,240,255,0.35)) drop-shadow(0 0 12px rgba(0,240,255,0.12));
  transition:filter 0.2s ease;
}
.skull-logo:hover{
  animation:skullGlitch 0.15s ease-in-out 3;
}
.skull-logo:hover svg{
  filter:drop-shadow(0 0 6px rgba(0,240,255,0.55)) drop-shadow(0 0 20px rgba(0,240,255,0.2)) drop-shadow(0 0 40px rgba(0,240,255,0.08));
}
.skull-eye{
  animation:skullEyePulse 2.2s ease-in-out infinite;
  transform-origin:center;
}
.skull-eye-r{
  animation-delay:0.3s;
}
.skull-outline{
  animation:skullOutlinePulse 4s ease-in-out infinite;
}

@keyframes skullEyePulse{
  0%,100%{opacity:0.7;transform:scale(1)}
  15%{opacity:0.95;transform:scale(1.06)}
  30%{opacity:0.8;transform:scale(0.98)}
  50%{opacity:1;transform:scale(1.04)}
  70%{opacity:0.75;transform:scale(1)}
}
@keyframes skullOutlinePulse{
  0%,100%{stroke-opacity:0.6}
  50%{stroke-opacity:1}
}
.dash-nav-brand{font-size:0.8rem;display:flex;align-items:center;gap:6px}
.dash-nav-brand .ps1{color:var(--green);font-weight:700}
.dash-nav-brand .path{color:var(--cyan)}
.dash-nav-brand .prompt-sym{color:var(--text-dim)}

.dash-nav-links{display:flex;align-items:center;gap:1rem}
.dash-nav-status{font-size:0.65rem;color:var(--text-dim)}
.dash-nav-status::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;box-shadow:0 0 8px rgba(0,255,136,0.4);vertical-align:middle}

.dash-btn{
  padding:0.45rem 1.2rem;
  background:linear-gradient(135deg,rgba(0,240,255,0.08),rgba(0,240,255,0.02));
  border:1px solid rgba(0,240,255,0.15);
  border-radius:var(--radius);
  color:var(--cyan);
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;
  cursor:pointer;
  transition:all 0.25s ease;
  text-transform:uppercase;
  letter-spacing:0.08em;
}
.dash-btn:hover{
  background:linear-gradient(135deg,rgba(0,240,255,0.15),rgba(0,240,255,0.05));
  border-color:rgba(0,240,255,0.35);
  box-shadow:0 0 25px rgba(0,240,255,0.1);
  transform:translateY(-1px);
}

.dash-hero{text-align:center;padding:3rem 0 2rem}
.dash-title{
  font-size:clamp(1.6rem,4vw,3rem);
  font-weight:800;
  letter-spacing:0.15em;
  color:var(--text);
  position:relative;
  display:inline-block;
}
.dash-subtitle{
  font-size:0.75rem;
  color:var(--text-dim);
  margin-top:0.5rem;
  min-height:1.2em;
}
.dash-subtitle::after{content:'_';animation:blink 1s step-end infinite;color:var(--cyan);margin-left:2px}

/* ===== GLITCH EFFECT ===== */
.glitch{
  position:relative;
  animation:glitch-skew 4s infinite linear alternate-reverse;
}
@keyframes glitch-skew{
  0%,80%,100%{transform:skew(0deg)}
  81%{transform:skew(1deg)}
  82%{transform:skew(-0.5deg)}
  83%{transform:skew(0deg)}
}
.glitch::before,.glitch::after{
  content:attr(data-text);
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  opacity:0;
}
.glitch::before{
  color:var(--cyan);
  animation:glitch-before 3s infinite linear alternate-reverse;
  clip-path:inset(0 0 60% 0);
}
.glitch::after{
  color:var(--red);
  animation:glitch-after 3s infinite linear alternate-reverse;
  clip-path:inset(60% 0 0 0);
}
@keyframes glitch-before{
  0%,6%,10%,94%,100%{opacity:0;transform:translate(0)}
  7%{opacity:0.6;transform:translate(-2px,-2px)}
  9%{opacity:0.6;transform:translate(2px,1px)}
}
@keyframes glitch-after{
  0%,6%,10%,94%,100%{opacity:0;transform:translate(0)}
  7%{opacity:0.4;transform:translate(2px,2px)}
  9%{opacity:0.4;transform:translate(-2px,-1px)}
}

/* ===== STAT RINGS ===== */
.dash-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1.25rem;
  max-width:700px;margin:0 auto 2.5rem;
}

.stat-ring-card{
  background:var(--bg-card);
  border:1px solid rgba(0,240,255,0.06);
  border-radius:12px;
  padding:1.25rem 1rem;
  display:flex;flex-direction:column;
  align-items:center;gap:0.75rem;
  position:relative;
  overflow:hidden;
  transition:all 0.3s ease;
}
.stat-ring-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:0;
  transition:opacity 0.3s;
}
.stat-ring-card:hover::before{opacity:0.6}
.stat-ring-card:hover{
  border-color:rgba(0,240,255,0.15);
  transform:translateY(-3px);
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
}
.stat-ring-card#statApprentice::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.stat-ring-card#statPractitioner::before{background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.stat-ring-card#statExpert::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}

.stat-ring{width:90px;height:90px;transform:rotate(-90deg)}
.stat-ring .ring-bg{
  fill:none;stroke:rgba(255,255,255,0.04);stroke-width:4;
}
.stat-ring .ring-fg{
  fill:none;stroke-width:4;stroke-linecap:round;
  stroke-dasharray:326.7;stroke-dashoffset:326.7;
  transition:stroke-dashoffset 1.2s ease;
}
.ring-fg-cyan{stroke:var(--cyan);filter:drop-shadow(0 0 6px rgba(0,240,255,0.3))}
.ring-fg-green{stroke:var(--green);filter:drop-shadow(0 0 6px rgba(0,255,136,0.3))}
.ring-fg-amber{stroke:var(--amber);filter:drop-shadow(0 0 6px rgba(255,170,0,0.3))}
.ring-fg-red{stroke:var(--red);filter:drop-shadow(0 0 6px rgba(255,51,85,0.3))}

.stat-ring-text{
  position:absolute;
  display:flex;flex-direction:column;
  align-items:center;gap:2px;
}
.stat-ring-num{
  font-size:1.4rem;font-weight:700;
  color:var(--text);
  line-height:1;
}
.stat-ring-label{
  font-size:0.55rem;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--text-dim);
}
#statTotal .stat-ring-num{color:var(--cyan)}
#statApprentice .stat-ring-num{color:var(--green)}
#statPractitioner .stat-ring-num{color:var(--amber)}
#statExpert .stat-ring-num{color:var(--red)}

/* ===== PHASE CARDS ===== */
.dash-phases{
  display:flex;flex-direction:column;
  gap:0.75rem;
  max-width:800px;margin:0 auto;
  width:100%;
}

.phase-card{
  background:var(--bg-card);
  border:1px solid rgba(0,240,255,0.05);
  border-radius:var(--radius);
  overflow:hidden;
  transition:all 0.25s ease;
}
.phase-card:hover{
  border-color:rgba(0,240,255,0.1);
  box-shadow:0 4px 30px rgba(0,0,0,0.3);
}

.phase-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.6rem 1rem;
  cursor:pointer;
  user-select:none;
  transition:background 0.2s;
}
.phase-card-header:hover{background:rgba(0,240,255,0.02)}
.phase-card-title{font-size:0.7rem;color:var(--text);font-weight:500}
.phase-card-pct{font-size:0.6rem;color:var(--cyan)}
.phase-card-bar{
  height:2px;background:rgba(255,255,255,0.04);
  margin:0 1rem 0.6rem;
  border-radius:2px;overflow:hidden;
}
.phase-card-bar-inner{
  height:100%;border-radius:2px;
  transition:width 0.8s ease;
}

.phase-card-topics{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:3px;
  padding:0 0.6rem 0.6rem;
}

.phase-topic-chip{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.3rem 0.5rem;
  background:rgba(0,0,0,0.2);
  border-radius:4px;
  font-size:0.6rem;
  cursor:pointer;
  transition:all 0.2s;
  border:1px solid transparent;
}
.phase-topic-chip:hover{
  border-color:rgba(0,240,255,0.08);
  background:rgba(0,240,255,0.03);
}
.phase-topic-chip .ptc-name{color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phase-topic-chip .ptc-count{color:var(--text-dimmer);flex-shrink:0;margin-left:6px;font-size:0.55rem}

.dash-footer{
  margin-top:auto;
  padding-top:1.5rem;
  padding-bottom:0.5rem;
  text-align:center;
}
.dash-footer-text{font-size:0.6rem;color:var(--text-dimmer)}
.blinking-cursor{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ===== LABS VIEW ===== */
.labs-app{display:flex;flex-direction:column;height:100vh}

.labs-topbar{
  display:flex;align-items:center;
  padding:0.5rem 1rem;
  background:var(--bg2);
  border-bottom:1px solid rgba(0,240,255,0.06);
  gap:0.75rem;
  flex-shrink:0;
  position:relative;
}
.labs-topbar::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:0.15;
}

.back-btn{
  background:transparent;
  border:1px solid rgba(0,240,255,0.08);
  border-radius:4px;
  color:var(--cyan);
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;
  padding:0.25rem 0.65rem;
  cursor:pointer;
  transition:all 0.2s;
  flex-shrink:0;
}
.back-btn:hover{
  background:rgba(0,240,255,0.06);
  border-color:rgba(0,240,255,0.2);
}

.labs-prompt{flex:1;font-size:0.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.labs-prompt .ps1{color:var(--green);font-weight:700}
.labs-prompt .path{color:var(--cyan)}
.labs-prompt .prompt-sym{color:var(--text-dim);margin:0 4px}
.labs-prompt-cmd{color:var(--text-dim)}

.labs-topbar-right{flex-shrink:0}
.labs-progress-text{font-size:0.65rem;color:var(--cyan)}

.labs-body{display:flex;flex:1;overflow:hidden}

.labs-sidebar{
  width:250px;
  background:var(--bg2);
  border-right:1px solid rgba(0,240,255,0.04);
  overflow-y:auto;
  flex-shrink:0;
}
.labs-sidebar-header{
  padding:0.7rem 1rem;
  border-bottom:1px solid rgba(0,240,255,0.04);
  font-size:0.65rem;
}
.labs-sidebar-header .ps1{color:var(--green)}
.labs-sidebar-header .path{color:var(--cyan)}
.labs-sidebar-header .cmd{color:var(--text-dim)}

.sidebar-phase-group{margin-bottom:0}
.sidebar-phase-header{
  padding:0.5rem 1rem 0.3rem;
  font-size:0.55rem;
  font-weight:700;
  letter-spacing:0.08em;
  color:var(--text-dimmer);
  text-transform:uppercase;
  border-bottom:1px solid rgba(0,240,255,0.03);
}

.sidebar-topic-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;
  padding:0.4rem 1rem 0.4rem 1.25rem;
  background:none;
  border:none;
  border-left:2px solid transparent;
  color:var(--text-dim);
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;
  cursor:pointer;
  text-align:left;
  transition:all 0.15s;
}
.sidebar-topic-btn:hover{color:var(--text);background:rgba(255,255,255,0.01)}
.sidebar-topic-btn.active{
  color:var(--cyan);
  border-left-color:var(--cyan);
  background:rgba(0,240,255,0.05);
}
.sidebar-topic-btn .stb-count{font-size:0.55rem;color:var(--text-dimmer)}

/* ===== LABS MAIN ===== */
.labs-main{flex:1;overflow-y:auto;padding:1.25rem 1.5rem 3rem}
.labs-main-inner{max-width:900px}

.lab-topic-header{margin-bottom:1.25rem}
.lab-topic-breadcrumb{font-size:0.6rem;color:var(--text-dimmer);margin-bottom:0.3rem}
.lab-topic-breadcrumb .ps1{color:var(--green)}
.lab-topic-breadcrumb .path{color:var(--cyan)}
.lab-topic-title{font-size:1rem;font-weight:500;color:var(--text);margin-bottom:0.4rem}
.lab-topic-meta{font-size:0.6rem;color:var(--text-dim);display:flex;gap:0.75rem}
.lab-topic-meta strong{color:var(--text);font-weight:500}

.lab-controls{
  display:flex;gap:0.5rem;align-items:center;
  margin-bottom:1rem;flex-wrap:wrap;
}

.lab-search{
  flex:1;min-width:160px;
  background:var(--bg3);
  border:1px solid rgba(0,240,255,0.08);
  border-radius:4px;
  padding:0.4rem 0.7rem;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;
  outline:none;
  transition:border-color 0.15s;
}
.lab-search:focus{border-color:rgba(0,240,255,0.25);box-shadow:0 0 12px rgba(0,240,255,0.05)}
.lab-search::placeholder{color:var(--text-dimmer);opacity:0.5}

.lab-filter-btn{
  padding:0.3rem 0.6rem;
  background:var(--bg3);
  border:1px solid rgba(0,240,255,0.06);
  border-radius:4px;
  color:var(--text-dim);
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  cursor:pointer;
  transition:all 0.15s;
}
.lab-filter-btn:hover{border-color:rgba(0,240,255,0.15);color:var(--text)}
.lab-filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,0.06)}

.lab-reset-btn{
  padding:0.3rem 0.6rem;
  background:transparent;
  border:1px solid rgba(255,51,85,0.12);
  border-radius:4px;
  color:var(--red);
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  cursor:pointer;
  opacity:0.5;
  transition:all 0.15s;
}
.lab-reset-btn:hover{opacity:1;border-color:rgba(255,51,85,0.25)}

.lab-list{display:flex;flex-direction:column;gap:2px}

.lab-item{
  display:flex;align-items:center;gap:0.5rem;
  padding:0;background:transparent;
  border:1px solid transparent;
  border-radius:4px;
  transition:all 0.15s;
  position:relative;
}
.lab-item:hover{border-color:rgba(0,240,255,0.05)}
.lab-item.completed{opacity:0.5}

.lab-link{
  display:block;
  position:absolute;inset:0;
  z-index:0;
  padding:0.35rem 0.6rem 0.35rem 2.2rem;
  color:var(--text);
  text-decoration:none;
  font-size:0.65rem;
  border-radius:4px;
  transition:all 0.15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:0.5rem;
}
.lab-link:hover{color:var(--cyan);background:rgba(0,0,0,0.15)}
.lab-item.completed .lab-link{color:var(--text-dimmer);text-decoration:line-through}

.lab-link .lab-num-part{font-size:0.55rem;color:var(--text-dimmer);min-width:1.4rem;text-align:right;flex-shrink:0}
.lab-link .lab-title-part{flex:1;overflow:hidden;text-overflow:ellipsis}
.lab-link .lab-diff-part{flex-shrink:0}

.lab-cb{
  appearance:none;-webkit-appearance:none;
  width:16px;height:16px;
  border:1px solid rgba(0,240,255,0.15);
  border-radius:3px;
  background:var(--bg2);
  cursor:pointer;
  flex-shrink:0;
  position:relative;z-index:2;
  margin-left:0.6rem;
  transition:all 0.15s;
}
.lab-cb:hover{border-color:rgba(0,240,255,0.3)}
.lab-cb:checked{
  background:var(--cyan);
  border-color:var(--cyan);
  box-shadow:0 0 8px rgba(0,240,255,0.25);
}
.lab-cb:checked::after{
  content:'';position:absolute;
  top:2px;left:5px;
  width:4px;height:8px;
  border:2px solid var(--bg);
  border-top:none;border-left:none;
  transform:rotate(45deg);
}

.lab-num{display:none}
.lab-badge{display:none}

.lab-badge{
  font-size:0.5rem;
  padding:0.08rem 0.35rem;
  border-radius:3px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.04em;

// ===== STATE =====
const STORAGE_KEY = 'pwn_tracker_v3';
let currentTopicSlug = null;
let currentFilter = 'all';
let currentSearch = '';
let sidebarOpen = false;

function getCompleted() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveCompleted(set) { localStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); }

function toggleCompleted(url) {
  const s = getCompleted();
  s.has(url) ? s.delete(url) : s.add(url);
  saveCompleted(s);
  return s;
}

function getAllLabs() {
  const r = [];
  for (const p of DATA.phases)
    for (const t of p.topics)
      for (const l of t.labs)
        r.push({...l, topicSlug: t.slug, phaseId: p.id, topicName: t.name});
  return r;
}
const ALL_LABS = getAllLabs();

function getStats() {
  const completed = getCompleted();
  const total = ALL_LABS.length;
  const done = completed.size;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const byDiff = {Apprentice:{t:0,d:0},Practitioner:{t:0,d:0},Expert:{t:0,d:0}};
  for (const l of ALL_LABS) {
    byDiff[l.d].t++;
    if (completed.has(l.u)) byDiff[l.d].d++;
  }
  const byPhase = DATA.phases.map(p => {
    const labs = [];
    for (const t of p.topics) for (const l of t.labs) labs.push(l);
    const d = labs.filter(l => completed.has(l.u)).length;
    return {name: p.name, slug: p.slug, total: labs.length, done: d, pct: Math.round((d/labs.length)*100)};
  });
  const byTopic = [];
  for (const p of DATA.phases)
    for (const t of p.topics) {
      const d = t.labs.filter(l => completed.has(l.u)).length;
      byTopic.push({name: t.name, slug: t.slug, total: t.labs.length, done: d, pct: Math.round((d/t.labs.length)*100), phase: p.name});
    }
  return {total, done, pct, byDiff, byPhase, byTopic};
}

function h(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== VIEWS =====
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== MATRIX RAIN =====
function initMatrix() {
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>/{}[]|&^%$#@!';
  const fontSize = 14;
  const cols = Math.floor(canvas.width / fontSize);
  const drops = Array(cols).fill(1);

  function draw() {
    ctx.fillStyle = 'rgba(5,8,14,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = `${fontSize}px monospace`;
    for (let i = 0; i < drops.length; i++) {
      const char = chars[Math.floor(Math.random() * chars.length)];
      const x = i * fontSize;
      const y = drops[i] * fontSize;
      const brightness = Math.random() * 0.5 + 0.3;
      ctx.fillStyle = `rgba(0,240,255,${brightness * 0.35})`;
      ctx.fillText(char, x, y);
      if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 45);
}

// ===== LOADING SCREEN =====
function initLoading() {
  const bar = document.getElementById('loadingBar');
  const screen = document.getElementById('loadingScreen');
  let pct = 0;
  const interval = setInterval(() => {
    pct += Math.random() * 8 + 2;
    if (pct > 100) pct = 100;
    bar.style.width = pct + '%';
    if (pct >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        screen.classList.add('hidden');
        showView('view-dashboard');
        renderDashboard();
      }, 400);
    }
  }, 120);
}

// ===== TYPEWRITER =====
function typewriter(el, text, speed = 30) {
  el.textContent = '';
  let i = 0;
  function type() {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
      setTimeout(type, speed + Math.random() * 20);
    }
  }
  setTimeout(type, 500);
}

// ===== COUNTER ANIMATION =====
function animateCounter(el, target, duration = 1200) {
  const start = performance.now();
  const initial = parseInt(el.textContent) || 0;
  function update(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.floor(initial + (target - initial) * ease);
    if (t < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

// ===== DASHBOARD =====
function renderDashboard() {
  const s = getStats();
  const completed = getCompleted();

  // Update rings
  const circumference = 2 * Math.PI * 52;
  const rings = [
    { id: 'statTotalNum', ring: '#statTotal .ring-fg', target: s.done, max: s.total, label: 'total' },
    { id: 'statApprenticeNum', ring: '#statApprentice .ring-fg', target: s.byDiff.Apprentice.d, max: s.byDiff.Apprentice.t, label: 'apprentice' },
    { id: 'statPractitionerNum', ring: '#statPractitioner .ring-fg', target: s.byDiff.Practitioner.d, max: s.byDiff.Practitioner.t, label: 'practitioner' },
    { id: 'statExpertNum', ring: '#statExpert .ring-fg', target: s.byDiff.Expert.d, max: s.byDiff.Expert.t, label: 'expert' },
  ];

  rings.forEach(r => {
    const numEl = document.getElementById(r.id);
    if (numEl) {
      const currentVal = parseInt(numEl.textContent) || 0;
      animateCounter(numEl, r.target);
    }
    const ringEl = document.querySelector(r.ring);
    if (ringEl) {
      const pct = r.max > 0 ? r.target / r.max : 0;
      const offset = circumference - (pct * circumference);
      setTimeout(() => { ringEl.style.strokeDashoffset = offset; }, 200);
      ringEl.style.strokeDasharray = circumference;
      ringEl.style.strokeDashoffset = circumference;
    }
  });

  document.getElementById('dashStatus').textContent = `connected — ${s.done}/${s.total}`;

  // Typewriter subtitle
  const subtitle = document.getElementById('dashSubtitle');
  const messages = [
    'initializing exploit framework...',
    'loading 274 lab modules...',
    `tracking ${s.done}/${s.total} completed labs`,
    `apprentice: ${s.byDiff.Apprentice.d}/${s.byDiff.Apprentice.t} | practitioner: ${s.byDiff.Practitioner.d}/${s.byDiff.Practitioner.t} | expert: ${s.byDiff.Expert.d}/${s.byDiff.Expert.t}`
  ];
  const msg = messages[Math.floor(Math.random() * messages.length)];
  typewriter(subtitle, msg, 25);

  // Phase cards
  const phasesContainer = document.getElementById('dashPhases');
  let phHtml = '';
  for (const ph of s.byPhase) {
    const color = ph.pct === 100 ? 'var(--green)' : ph.pct > 0 ? 'var(--cyan)' : 'rgba(255,255,255,0.05)';
    const topics = [];
    for (const p of DATA.phases) if (p.name === ph.name) {
      for (const t of p.topics) {
        const td = t.labs.filter(l => completed.has(l.u)).length;
        topics.push({name: t.name, slug: t.slug, done: td, total: t.labs.length});
      }
    }
    phHtml += `<div class="phase-card">
      <div class="phase-card-header" onclick="navigateToLab('${ph.slug === 'foundation' ? 'sql-injection' : ph.slug === 'client-side' ? 'xss' : 'insecure-deserialization'}')">
        <span class="phase-card-title">PHASE ${ph.slug === 'foundation' ? '1' : ph.slug === 'client-side' ? '2' : '3'} — ${h(ph.name)}</span>
        <span class="phase-card-pct">${ph.done}/${ph.total} (${ph.pct}%)</span>
      </div>
      <div class="phase-card-bar"><div class="phase-card-bar-inner" style="width:${ph.pct}%;background:${color}"></div></div>
      <div class="phase-card-topics">`;
    for (const tp of topics) {
      phHtml += `<div class="phase-topic-chip" onclick="navigateToLab('${tp.slug}')">
        <span class="ptc-name">${h(tp.name)}</span>
        <span class="ptc-count">${tp.done}/${tp.total}</span>
      </div>`;
    }
    phHtml += `</div></div>`;
  }
  phasesContainer.innerHTML = phHtml;
}

// ===== TRANSITION =====
function transitionTo(callback) {
  document.body.classList.add('is-transitioning');
  setTimeout(() => {
    callback();
    requestAnimationFrame(() => {
      setTimeout(() => {
        document.body.classList.remove('is-transitioning');
      }, 50);
    });
  }, 700);
}

// ===== NAVIGATION =====
function navigateToLab(slug) {
  transitionTo(() => {
    currentTopicSlug = slug;
    currentFilter = 'all';
    currentSearch = '';
    showView('view-labs');
    renderLabs();
  });
}

function goToDashboard() {
  transitionTo(() => {
    currentTopicSlug = null;
    showView('view-dashboard');
    renderDashboard();
  });
}

// ===== LABS VIEW =====
function renderLabs() {
  if (!currentTopicSlug) {
    // Default to first topic
    currentTopicSlug = 'sql-injection';
  }

  // Find topic
  let foundTopic = null, foundPhase = null;
  for (const p of DATA.phases)
    for (const t of p.topics)
      if (t.slug === currentTopicSlug) { foundTopic = t; foundPhase = p; break; }

  if (!foundTopic) { currentTopicSlug = 'sql-injection'; renderLabs(); return; }

  const completed = getCompleted();

  // Update topbar
  document.getElementById('labsPath').textContent = `~/portswigger/${foundTopic.slug}`;
  document.getElementById('labsPromptCmd').textContent = `ls -la --filter=${currentFilter}`;
  document.getElementById('labsProgressText').textContent = `${completed.size}/${ALL_LABS.length}`;

  // Render sidebar
  renderSidebar(foundTopic.slug);

  // Render main
  renderLabContent(foundTopic, foundPhase, completed);
}

function renderSidebar(activeSlug) {
  const container = document.getElementById('sidebarContent');
  let html = '';
  for (const p of DATA.phases) {
    html += `<div class="sidebar-phase-group"><div class="sidebar-phase-header">PHASE ${p.id}</div>`;
    for (const t of p.topics) {
      const cls = t.slug === activeSlug ? ' active' : '';
      html += `<button class="sidebar-topic-btn${cls}" data-slug="${t.slug}">
        <span>${String(t.number).padStart(2,'0')}. ${h(t.name)}</span>
        <span class="stb-count">${t.labs.length}</span>
      </button>`;
    }
    html += '</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.sidebar-topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      closeSidebar();
      transitionTo(() => {
        currentTopicSlug = btn.dataset.slug;
        currentFilter = 'all';
        currentSearch = '';
        renderLabs();
      });
    });
  });
}

function renderLabContent(topic, phase, completed) {
  const main = document.getElementById('labsMainInner');

  let labs = topic.labs;
  const search = currentSearch.toLowerCase().trim();
  if (search) labs = labs.filter(l => l.t.toLowerCase().includes(search));
  if (currentFilter !== 'all') labs = labs.filter(l => l.d === currentFilter);

  const totalInTopic = topic.labs.length;
  const doneInTopic = topic.labs.filter(l => completed.has(l.u)).length;

  const phaseName = `Phase ${phase.id} — ${phase.name}`;

  let html = `<div class="lab-topic-header">
    <div class="lab-topic-breadcrumb"><span class="ps1">root@pwn</span>:<span class="path">~/portswigger/${topic.slug}</span>$ <span class="cmd">cat README.md</span></div>
    <h1 class="lab-topic-title">${String(topic.number).padStart(2,'0')}. ${h(topic.name)}</h1>
    <div class="lab-topic-meta">
      <span><strong>${totalInTopic}</strong> labs</span>
      <span><strong>${doneInTopic}</strong> done</span>
      <span><strong>${totalInTopic - doneInTopic}</strong> left</span>
      <span>${h(phaseName)}</span>
    </div>
  </div>

  <div class="lab-controls">
    <input class="lab-search" id="labSearch" type="text" placeholder="grep -i 'search...'" value="${h(currentSearch)}">
    <button class="lab-filter-btn${currentFilter === 'all' ? ' active' : ''}" data-f="all">all</button>
    <button class="lab-filter-btn${currentFilter === 'Apprentice' ? ' active' : ''}" data-f="Apprentice">apprentice</button>
    <button class="lab-filter-btn${currentFilter === 'Practitioner' ? ' active' : ''}" data-f="Practitioner">practitioner</button>
    <button class="lab-filter-btn${currentFilter === 'Expert' ? ' active' : ''}" data-f="Expert">expert</button>
    <button class="lab-reset-btn" id="resetTopicLabs">reset</button>
  </div>

  <div class="lab-list">`;

  if (labs.length === 0) {
    html += `<div class="lab-none">// no matching labs found</div>`;
  } else {
    for (const l of labs) {
      const isDone = completed.has(l.u);
      const badgeClass = 'badge-' + l.d.toLowerCase();
      html += `<div class="lab-item${isDone ? ' completed' : ''}">
        <input class="lab-cb" type="checkbox" data-url="${h(l.u)}"${isDone ? ' checked' : ''}>
        <a class="lab-link" href="${h(l.u)}" target="_blank" rel="noopener noreferrer">
          <span class="lab-num-part">${String(l.n).padStart(2,'0')}</span>
          <span class="lab-title-part">${h(l.t)}</span>
          <span class="lab-diff-part lab-badge ${badgeClass}">${l.d}</span>
        </a>
      </div>`;
    }
  }

  html += `</div>`;
  main.innerHTML = html;

  // Search
  const searchBox = document.getElementById('labSearch');
  if (searchBox) {
    searchBox.addEventListener('input', () => {
      currentSearch = searchBox.value;
      renderLabContent(topic, phase, getCompleted());
    });
  }

  // Filters
  main.querySelectorAll('.lab-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.f;
      currentSearch = document.getElementById('labSearch')?.value || '';
      renderLabContent(topic, phase, getCompleted());
    });
  });

  // Checkbox handling
  main.querySelectorAll('.lab-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      toggleCompleted(cb.dataset.url);
      const c = getCompleted();
      document.getElementById('labsProgressText').textContent = `${c.size}/${ALL_LABS.length}`;
      renderLabContent(topic, phase, c);
      renderSidebar(currentTopicSlug);
    });
  });

  // Reset
  const resetBtn = document.getElementById('resetTopicLabs');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      const s = getCompleted();
      for (const l of topic.labs) s.delete(l.u);
      saveCompleted(s);
      renderLabContent(topic, phase, getCompleted());
      renderSidebar(currentTopicSlug);
      document.getElementById('labsProgressText').textContent = `${s.size}/${ALL_LABS.length}`;
    });
  }
}

function closeSidebar() {
  document.getElementById('labsSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
  sidebarOpen = false;
}

function toggleSidebar() {
  const sb = document.getElementById('labsSidebar');
  const ov = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('active');
  sidebarOpen = sb.classList.contains('open');
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  initSkullLogo();
  initMatrix();

  setTimeout(() => {
    initLoading();
  }, 300);

  // Nav
  document.getElementById('enterLabsBtn').addEventListener('click', () => navigateToLab('sql-injection'));
  document.getElementById('backToDashBtn').addEventListener('click', goToDashboard);

  // Sidebar toggle (mobile)
  document.getElementById('labsMenuToggle').addEventListener('click', toggleSidebar);
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

  // Open sidebar on mobile when clicking a placeholder
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSidebar();
  });
});
  </script>
